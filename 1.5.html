<body class="bg-white font-sans text-slate-900 overflow-x-hidden">

  <header class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto">

      <span class="text-3xl font-black lowercase tracking-tighter">snap</span>

        <span class="font-sans text-lg">meet</span>

    <div class="flex justify-center items-center">
